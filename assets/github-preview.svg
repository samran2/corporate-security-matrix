<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Corporate Security Matrix GitHub preview</title>
  <desc id="desc">A visual preview of the Corporate Security Matrix with domain tabs, lifecycle columns, and stacked actor, risk, and mitigation cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8f4eb" />
      <stop offset="100%" stop-color="#efe7da" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffdfa" />
      <stop offset="100%" stop-color="#f5efe5" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#2c3c44" flood-opacity="0.16" />
    </filter>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)" />
  <circle cx="1230" cy="140" r="180" fill="#d9823d" opacity="0.12" />
  <circle cx="180" cy="660" r="220" fill="#2b6673" opacity="0.12" />

  <g filter="url(#shadow)">
    <rect x="56" y="56" width="1288" height="708" rx="34" fill="#fbf8f2" stroke="#d8d0c1" />
  </g>

  <g transform="translate(94 94)">
    <text x="0" y="0" fill="#9d4410" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="20" font-weight="700" letter-spacing="4">CORPORATE SECURITY MATRIX</text>
    <text x="0" y="68" fill="#16303c" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="64" font-weight="700">Open-source global</text>
    <text x="0" y="136" fill="#16303c" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="64" font-weight="700">security matrix</text>
    <text x="0" y="188" fill="#55666f" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="24">
      <tspan x="0" dy="0">Threats, actors and mitigations in one ATT&amp;CK-inspired view.</tspan>
      <tspan x="0" dy="34">Built from ISO, NIST, WHO, ILO, UNDRR, OECD, CISA and other</tspan>
      <tspan x="0" dy="34">official global sources for corporate, cyber, safety and resilience work.</tspan>
    </text>

    <g transform="translate(0 252)">
      <rect x="0" y="0" width="162" height="44" rx="22" fill="#fff7ef" stroke="#e1bb96" />
      <text x="81" y="28" fill="#9d4410" text-anchor="middle" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="18" font-weight="700">9 domains</text>
      <rect x="178" y="0" width="194" height="44" rx="22" fill="#f3f8fa" stroke="#a6c0cb" />
      <text x="275" y="28" fill="#28576b" text-anchor="middle" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="18" font-weight="700">5 lifecycle phases</text>
      <rect x="388" y="0" width="214" height="44" rx="22" fill="#eef8f3" stroke="#a7c8be" />
      <text x="495" y="28" fill="#0b5e4b" text-anchor="middle" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="18" font-weight="700">Actors + risks + controls</text>
    </g>

    <g transform="translate(0 340)">
      <rect x="0" y="0" width="468" height="254" rx="26" fill="url(#panel)" stroke="#d8d0c1" />
      <text x="28" y="42" fill="#16303c" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="28" font-weight="700">What the repo shows at a glance</text>
      <g fill="#55666f" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="21">
        <text x="28" y="88">1. Domain tabs for personnel, cyber, continuity, integrity and safety.</text>
        <text x="28" y="128">2. Column matrices that move from Identify to Recover.</text>
        <text x="28" y="168">3. Detailed cell stacks with possible actors, concrete risks and mitigations.</text>
        <text x="28" y="208">4. Official source packs and briefing questions for real program use.</text>
      </g>
    </g>
  </g>

