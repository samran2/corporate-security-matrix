        <rect x="12" y="242" width="78" height="112" rx="14" fill="#edf8f4" stroke="#b9d4c8" />
        <text x="22" y="266" fill="#0b5e4b" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="12" font-weight="700">Mitigation</text>
        <text x="22" y="288" fill="#0b5e4b" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="11">Map crown jewels,</text>
