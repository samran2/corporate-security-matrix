<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="560" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">Corporate Security Matrix anatomy</title>
  <desc id="desc">An annotated diagram showing how the Corporate Security Matrix is organized from domain tabs to lifecycle columns and structured cell content.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#faf6ef" />
      <stop offset="100%" stop-color="#efe7da" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#2c3c44" flood-opacity="0.12" />
    </filter>
  </defs>

  <rect width="1400" height="560" fill="url(#bg)" />
  <g filter="url(#shadow)">
    <rect x="54" y="56" width="1292" height="448" rx="34" fill="#fbf8f2" stroke="#d8d0c1" />
  </g>

  <text x="88" y="116" fill="#16303c" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="42" font-weight="700">How the matrix is organized</text>
  <text x="88" y="154" fill="#55666f" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="22">GitHub visitors can understand the product in three layers: domains, lifecycle logic, and decision-ready content.</text>

  <g transform="translate(88 206)">
    <rect x="0" y="0" width="292" height="236" rx="28" fill="#fff7ef" stroke="#e1bb96" />
    <text x="28" y="46" fill="#9d4410" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="28" font-weight="700">1. Domain tabs</text>
    <text x="28" y="86" fill="#55666f" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="20">Each tab becomes its own corporate</text>
    <text x="28" y="116" fill="#55666f" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="20">security program view.</text>
    <rect x="28" y="148" width="106" height="32" rx="16" fill="#c55a11" />
    <text x="81" y="170" fill="#ffffff" text-anchor="middle" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="14" font-weight="700">Cybersecurity</text>
    <rect x="144" y="148" width="88" height="32" rx="16" fill="#f1e8db" stroke="#d8d0c1" />
    <text x="188" y="170" fill="#55666f" text-anchor="middle" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="14" font-weight="700">Personnel</text>
    <rect x="28" y="190" width="86" height="32" rx="16" fill="#f1e8db" stroke="#d8d0c1" />
    <text x="71" y="212" fill="#55666f" text-anchor="middle" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="14" font-weight="700">Integrity</text>
    <rect x="124" y="190" width="96" height="32" rx="16" fill="#f1e8db" stroke="#d8d0c1" />
    <text x="172" y="212" fill="#55666f" text-anchor="middle" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="14" font-weight="700">Continuity</text>
  </g>

  <g transform="translate(430 206)">
    <rect x="0" y="0" width="390" height="236" rx="28" fill="#f3f8fa" stroke="#a6c0cb" />
    <text x="28" y="46" fill="#28576b" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="28" font-weight="700">2. Lifecycle columns</text>
    <text x="28" y="86" fill="#55666f" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="20">Every domain stays on the same</text>
    <text x="28" y="116" fill="#55666f" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="20">defensive rhythm.</text>
    <g transform="translate(28 148)">
      <rect x="0" y="0" width="60" height="56" rx="16" fill="#ffffff" stroke="#bfd4dd" />
      <rect x="68" y="0" width="60" height="56" rx="16" fill="#ffffff" stroke="#bfd4dd" />
      <rect x="136" y="0" width="60" height="56" rx="16" fill="#ffffff" stroke="#bfd4dd" />
      <rect x="204" y="0" width="60" height="56" rx="16" fill="#ffffff" stroke="#bfd4dd" />
      <rect x="272" y="0" width="60" height="56" rx="16" fill="#ffffff" stroke="#bfd4dd" />
      <text x="30" y="34" fill="#28576b" text-anchor="middle" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="13" font-weight="700">Identify</text>
      <text x="98" y="34" fill="#28576b" text-anchor="middle" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="13" font-weight="700">Protect</text>
      <text x="166" y="34" fill="#28576b" text-anchor="middle" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="13" font-weight="700">Detect</text>
      <text x="234" y="34" fill="#28576b" text-anchor="middle" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="13" font-weight="700">Respond</text>
      <text x="302" y="34" fill="#28576b" text-anchor="middle" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="13" font-weight="700">Recover</text>
    </g>
  </g>

  <g transform="translate(870 206)">
    <rect x="0" y="0" width="430" height="236" rx="28" fill="#eef8f3" stroke="#a7c8be" />
    <text x="28" y="46" fill="#0b5e4b" font-family="'Avenir Next', 'Trebuchet MS', sans-serif" font-size="28" font-weight="700">3. Structured cell content</text>
    <text x="28" y="86" fill="#55666f" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="20">Each column stacks actor context,</text>
    <text x="28" y="116" fill="#55666f" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="20">concrete risks and direct mitigations.</text>
    <rect x="28" y="148" width="110" height="54" rx="18" fill="#edf4fb" stroke="#b7cce2" />
    <text x="83" y="180" fill="#204a72" text-anchor="middle" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="15" font-weight="700">Possible actor</text>
    <rect x="154" y="148" width="110" height="54" rx="18" fill="#fbeeed" stroke="#e4c0ba" />
    <text x="209" y="180" fill="#872314" text-anchor="middle" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="15" font-weight="700">Detailed risk</text>
    <rect x="280" y="148" width="122" height="54" rx="18" fill="#edf8f4" stroke="#b9d4c8" />
    <text x="341" y="180" fill="#0b5e4b" text-anchor="middle" font-family="'Aptos', 'Segoe UI', sans-serif" font-size="15" font-weight="700">Mitigation</text>
  </g>
</svg>
